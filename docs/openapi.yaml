openapi: 3.0.3
info:
  title: Architecture Agents Hub â€” API
  version: 1.0.0
  description: |
    Ponte HTTP ao aiox-core local: metadados de agentes (.md), versĂŁo CLI e feed de actividade (JSON no disco ou PostgreSQL com DATABASE_URL).

    **Rotas nĂŁo definidas** sob `/api` devolvem `404` com JSON `{ ok: false, error }`. **Rate limit** (`429`) devolve JSON com `retryAfterSec` opcional.

    **UI â€” Canvas de tarefas (Kanban):** por defeito `localStorage`; export/import JSON pode incluir `priority` e `blocked`. Opcional: **`GET`/`PUT /api/aiox/task-board`** persistem o quadro em JSON no servidor (`MISSION_TASK_BOARD_PATH`; por defeito `.mission-agent/task-board.json`) quando a UI define **`VITE_TASK_BOARD_SYNC`**. `PUT` aceita cabeĂ§alho **`If-Match`** com `revision` (mtime:size) â€” conflito **409**.
servers:
  - url: http://127.0.0.1:8787
    description: Desenvolvimento (PORT por defeito)
paths:
  /api/health:
    get:
      summary: Estado do serviĂ§o
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  service: { type: string, example: mission-agent-bridge }
  /api/aiox/metrics:
    get:
      summary: MĂ©tricas locais (CPU/memĂłria) para a central de agentes (canvas)
      description: |
        Usado pelo escritĂłrio pixel art (rack de servidor). `disk_pct` e `temp_c` podem ser 0 quando nĂŁo disponĂ­veis.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_pct: { type: integer }
                  mem_pct: { type: integer }
                  disk_pct: { type: integer }
                  temp_c: { type: number }
                  uptime: { type: integer, description: segundos desde o arranque do processo Node }
  /api/aiox/weather:
    get:
      summary: Tempo (wttr.in) para o widget na central
      description: LocalizaĂ§ĂŁo por `WEATHER_LOCATION` (por defeito Lisbon,Portugal).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  temp_c: { oneOf: [{ type: string }, { type: number }] }
                  desc: { type: string }
                  code: { type: integer }
                  location: { type: string }
  /api/aiox/info:
    get:
      summary: Metadados aiox-core e contagem de agentes
      responses:
        "200":
          description: InformaĂ§ĂŁo agregada
          content:
            application/json:
              schema:
                type: object
                properties:
                  aioxRoot:
                    type: string
                    description: Raiz do projeto AIOX (pasta com .aiox-core); nĂŁo Ă© sĂł o nome do repositĂłrio git
                  aioxExists: { type: boolean }
                  agentsDir:
                    type: string
                    description: Pasta dos *.md resolvida via resource_locations.agents_dir (L1â†’L2â†’L4) ou AIOX_AGENTS_DIR
                  version: { type: string, nullable: true }
                  versionError: { type: string, nullable: true }
                  agentCount: { type: integer }
                  agentsError: { type: string, nullable: true }
                  pathsMasked: { type: boolean, description: "Quando true, aioxRoot/agentsDir sĂŁo truncados (MASK_PATHS_IN_UI)" }
                  aioxExecAvailable: { type: boolean, description: "ExecuĂ§ĂŁo doctor/info disponĂ­vel (env + segredo)" }
                  activityBackend:
                    type: string
                    enum: [file, postgres]
                    description: "Onde o feed de atividade estĂˇ persistido (ficheiro JSON ou PostgreSQL)"
                  agentEditAllowed:
                    type: boolean
                    description: "false quando MISSION_AGENT_EDIT=0 â€” sem criar/editar/eliminar agentes (.md) via API"
                  taskBoard:
                    type: object
                    description: "Quadro Kanban persistido em ficheiro (mesmo caminho que GET task-board)"
                    properties:
                      revision:
                        type: string
                        description: "mtime:size do ficheiro (vazio = 0:0)"
                      taskCount: { type: integer }
  /api/aiox/task-board:
    get:
      summary: Quadro Kanban (Canvas) persistido no servidor
      description: |
        Ficheiro JSON por defeito em `MissionAgent/.mission-agent/task-board.json` (ou `MISSION_TASK_BOARD_PATH`).
        A UI sincroniza sĂł com `VITE_TASK_BOARD_SYNC=1` no build Vite.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, tasks, revision]
                properties:
                  ok: { type: boolean, example: true }
                  tasks:
                    type: array
                    description: Tarefas validadas (colunas todo|doing|review|done)
                    items: { type: object }
                  revision:
                    type: string
                    description: "Usar em If-Match no PUT"
    put:
      summary: Gravar quadro Kanban no servidor
      description: |
        Corpo `{ "tasks": [ ... ] }` (ou array no topo). MĂˇximo 2000 tarefas. Rate limit `TASK_BOARD_PUT_RATE_MAX` por IP/min (por defeito 45).
        Com cabeĂ§alho `If-Match` diferente da revisĂŁo actual do ficheiro â†’ **409** `conflict`.
      parameters:
        - name: If-Match
          in: header
          required: false
          schema: { type: string }
          description: RevisĂŁo devolvida por GET (ou `0:0` se o ficheiro nĂŁo existir)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [tasks]
                  properties:
                    tasks: { type: array, items: { type: object } }
                - type: array
                  description: Alternativa aceite â€” lista de tarefas
                  items: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, revision]
                properties:
                  ok: { type: boolean, example: true }
                  revision: { type: string }
        "400":
          description: Payload invĂˇlido
        "409":
          description: Conflito (If-Match)
        "429":
          description: Rate limit
  /api/aiox/customization:
    get:
      summary: PersonalizaĂ§ĂŁo do hub (agentes + escritĂłrio)
      description: |
        Contrato base para modo hĂ­brido (local agora, sync servidor opcional).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      agents:
                        type: object
                        additionalProperties: { type: object }
                      office:
                        type: object
                  revision: { type: string, description: "Usar no If-Match do PUT" }
    put:
      summary: Gravar personalizaĂ§ĂŁo do hub
      parameters:
        - name: If-Match
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agents:
                  type: object
                  additionalProperties: { type: object }
                office:
                  type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  revision: { type: string }
        "409":
          description: Conflito (If-Match)
        "429":
          description: Rate limit
  /api/aiox/fish:
    get:
      summary: Estado do aquĂˇrio (raĂ§ĂŁo do peixe)
      description: |
        Persiste `food`/`maxFood` num ficheiro local (`MISSION_FISH_PATH` ou por defeito `.mission-agent/fish-state.json`) e devolve um `mood` derivado.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  food: { type: integer }
                  maxFood: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  mood:
                    type: string
                    enum: [feliz, normal, fome, critico]
  /api/aiox/fish/consume:
    post:
      summary: Consome raĂ§ĂŁo do aquĂˇrio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, description: 'Quantidade a consumir (0-50)' }
                source: { type: string, description: 'Origem do consumo (ex: command; task:doing)' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  food: { type: integer }
                  maxFood: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  mood:
                    type: string
                    enum: [feliz, normal, fome, critico]
  /api/aiox/fish/feed:
    post:
      summary: Alimenta o peixe (recupera raĂ§ĂŁo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, description: Quantidade a adicionar (1-50) }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  food: { type: integer }
                  maxFood: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  mood:
                    type: string
                    enum: [feliz, normal, fome, critico]
  /api/aiox/integrations-status:
    get:
      summary: Status de integraĂ§Ăµes (API / DB / LLM / tokens)
      parameters:
        - name: validate
          in: query
          required: false
          description: |
            Definir a `1` para executar sondagens HTTP (LLM, Notion, Figma), preencher `*_Validated` / `*_Error` em `doubts`, `notion`, `figma` e gravar entrada em `history`.
            Omitir para resposta sĂł baseada em env (snapshot); campos de validaĂ§ĂŁo LLM podem nĂŁo aparecer â€” ver descriĂ§ĂŁo do endpoint.
          schema:
            type: string
            enum: ["1"]
      description: |
        Painel para a UI verificar o que o servidor consegue detetar (env/configs e capacidades).

        **Snapshot (sem `validate=1` ou com query omitida):** sĂł leitura de configuraĂ§ĂŁo local.
        O objecto `doubts` inclui `llmKeyConfigured`, `llmEnabled`, `doubtsOptIn`, `streamAvailable`, etc.
        Os campos `llmValidated`, `llmError`, `openaiValidated`, `openaiError`, `llmValidationSkipped` **nĂŁo vĂŞm preenchidos** pela sondagem HTTP â€” nĂŁo interpretar a ausĂŞncia como falha: o resumo (`summary`) e `alerts` consideram o LLM DĂşvidas como satisfeito quando `llmEnabled` e `llmKeyConfigured` sĂŁo verdadeiros (opt-in + chave â‰Ą8 caracteres).

        **Com `validate=1`:** o servidor corre validaĂ§Ăµes externas (com TTL ~45s em cache) e **mergeia** o resultado na resposta.
        AĂ­ `doubts.llmValidated` / `doubts.openaiValidated` reflectem a sondagem (ou `true` com `llmValidationSkipped` se `MISSION_LLM_VALIDATE=0`).
        Se a sondagem falhar, `llmError` / `openaiError` trazem a mensagem; o cartĂŁo no resumo deixa de contar OK para o LLM.
        Notion: `GET /v1/users/me`; Figma: `GET /v1/me`.
        LLM: `GET {MISSION_LLM_BASE_URL}/{MISSION_LLM_PROBE_PATH}` (por defeito `.../v1/models`) com Bearer `MISSION_LLM_API_KEY` ou `OPENAI_API_KEY`; com `MISSION_LLM_VALIDATE=0` nĂŁo hĂˇ pedido HTTP (sĂł verifica comprimento da chave).

        Novos snapshots no `history` sĂŁo gravados quando se usa `validate=1`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, generatedAt, database, exec, doubts, notion, figma, fish, slack]
                properties:
                  ok: { type: boolean, example: true }
                  generatedAt: { type: string, format: date-time }
                  summary:
                    type: object
                    description: |
                      Contagens usadas pelo painel IntegraĂ§Ăµes (`okCount`/`total`, `healthScore` 0â€“100).
                      O critĂ©rio â€śLLM DĂşvidas OKâ€ť sem `validate=1` Ă© configuraĂ§ĂŁo presente; com `validate=1` exige sondagem bem-sucedida (ou skip `MISSION_LLM_VALIDATE=0`).
                    properties:
                      okCount: { type: integer }
                      total: { type: integer }
                      healthScore: { type: integer, minimum: 0, maximum: 100 }
                  alerts:
                    type: array
                    description: |
                      Alertas operacionais derivados do estado actual.
                      Sem `validate=1`, o LLM DĂşvidas sĂł gera alerta se nĂŁo estiver configurado (opt-in/chave); com `validate=1`, inclui falhas de sondagem HTTP.
                    items: { type: string }
                  history:
                    type: array
                    description: Ăšltimos snapshots de saĂşde (persistidos no servidor quando validate=1).
                    items:
                      type: object
                      properties:
                        generatedAt: { type: string, format: date-time }
                        healthScore: { type: integer, minimum: 0, maximum: 100 }
                        okCount: { type: integer }
                        total: { type: integer }
                        alerts:
                          type: array
                          items: { type: string }
                  database:
                    type: object
                    properties:
                      configured: { type: boolean }
                      activityBackend: { type: string, enum: [file, postgres] }
                  exec:
                    type: object
                    properties:
                      configured: { type: boolean }
                  doubts:
                    type: object
                    description: |
                      Estado do painel DĂşvidas / LLM no servidor.
                      **Sem `validate=1`:** presentes sobretudo `llmKeyConfigured`, `doubtsOptIn`, `llmEnabled`, `streamAvailable`; campos de validaĂ§ĂŁo HTTP podem estar ausentes.
                      **Com `validate=1`:** mesmos campos + resultado da sondagem (`llmValidated`, `llmError`, opcional `llmValidationSkipped`).
                    properties:
                      llmKeyConfigured:
                        type: boolean
                        description: "Chave LLM presente no env (â‰Ą8 caracteres), independentemente de `validate=1`."
                      openaiKeyConfigured:
                        type: boolean
                        description: "Alias de llmKeyConfigured (compatibilidade)."
                      doubtsOptIn: { type: boolean, description: "`MISSION_DOUBTS_LLM=1`." }
                      llmEnabled:
                        type: boolean
                        description: "Opt-in + chave â€” rotas de chat disponĂ­veis no servidor."
                      streamAvailable: { type: boolean }
                      llmValidated:
                        type: boolean
                        description: |
                          Resultado da sondagem HTTP ao upstream LLM. **SĂł Ă© enviado na resposta quando `validate=1`** (merge com cache de validaĂ§ĂŁo).
                          Se o campo estiver ausente, nĂŁo assumir falha se `llmEnabled` e `llmKeyConfigured` forem `true`.
                          Com `MISSION_LLM_VALIDATE=0`, a validaĂ§ĂŁo Ă© considerada OK sem GET (`llmValidationSkipped`).
                      llmError:
                        type: string
                        nullable: true
                        description: "Mensagem quando `validate=1` e a sondagem LLM falhou (ou sem chave). Ausente ou null quando OK."
                      llmValidationSkipped:
                        type: boolean
                        description: "Presente com `validate=1` quando `MISSION_LLM_VALIDATE=0` (sem GET ao upstream)."
                      openaiValidated:
                        type: boolean
                        description: "Alias de llmValidated (compatibilidade); mesma regra de presenĂ§a sĂł com `validate=1`."
                      openaiError:
                        type: string
                        nullable: true
                        description: "Alias de llmError (compatibilidade)."
                  notion:
                    type: object
                    properties:
                      tokenConfigured: { type: boolean }
                      tokenValidated:
                        type: boolean
                        description: "SĂł existe quando validate=1."
                      tokenError:
                        type: string
                        nullable: true
                  figma:
                    type: object
                    properties:
                      tokenConfigured: { type: boolean }
                      tokenValidated:
                        type: boolean
                        description: "SĂł existe quando validate=1."
                      tokenError:
                        type: string
                        nullable: true
                  fish:
                    type: object
                    properties:
                      persistence: { type: string, example: file }
                      enabled: { type: boolean }
                  slack:
                    type: object
                    description: Espelho opcional do feed para Slack (Incoming Webhook).
                    properties:
                      persistence: { type: string, example: webhook }
                      enabled: { type: boolean }
                      webhookConfigured: { type: boolean }
                      webhookFormatOk: { type: boolean }
                      mirrorReady: { type: boolean }
  /api/aiox/figma/context:
    post:
      summary: LĂŞ e resume contexto de design do Figma
      description: |
        Endpoint de leitura para extrair contexto de design a partir de `figmaUrl` ou `fileKey`.
        Requer `FIGMA_ACCESS_TOKEN` configurado no servidor.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                figmaUrl:
                  type: string
                  description: URL Figma completa (file/design, opcionalmente com node-id)
                fileKey:
                  type: string
                  description: Chave do ficheiro Figma (alfanumĂ©rica)
                nodeId:
                  type: string
                  description: ID do nĂł (ex. 123:456). Aceita hĂ­fen e normaliza para dois-pontos.
                depth:
                  type: integer
                  minimum: 1
                  maximum: 8
                  description: Profundidade opcional da leitura no documento
      responses:
        "200":
          description: Contexto obtido com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  source:
                    type: object
                    properties:
                      fileKey: { type: string }
                      nodeId: { type: string, nullable: true }
                      depth: { type: integer, nullable: true }
                  meta:
                    type: object
                    properties:
                      fileName: { type: string, nullable: true }
                      version: { type: string, nullable: true }
                      lastModified: { type: string, nullable: true }
                      thumbnailUrl: { type: string, nullable: true }
                  designSummary:
                    type: object
                    properties:
                      nodeCount: { type: integer, minimum: 0 }
                      rootType: { type: string, nullable: true }
                      rootName: { type: string, nullable: true }
        "400":
          description: Pedido invĂˇlido ou falha de leitura no upstream Figma
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  code: { type: string, example: FIGMA_CONTEXT_ERROR }
                  error: { type: string }
        "503":
          description: Token Figma ausente no servidor
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  code: { type: string, example: FIGMA_TOKEN_MISSING }
                  error: { type: string }
                  hint: { type: string }
  /api/aiox/overview:
    get:
      summary: Vista agregada (ponte + lista de agentes + feed + contagens)
      description: |
        Um Ăşnico pedido em substituiĂ§ĂŁo de `GET /api/aiox/info` + `GET /api/aiox/agents` + `GET /api/aiox/activity` para o polling da UI.
        `activity.kindCounts` agrega entradas do feed por campo `kind` (ou `type` em entradas antigas).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  generatedAt: { type: string, format: date-time }
                  bridge:
                    description: Mesmo objecto que `/api/aiox/info`
                    type: object
                  agents:
                    type: array
                    items: { type: object }
                  agentsError: { type: string, nullable: true }
                  logs:
                    type: array
                    description: Mesmo formato que `/api/aiox/activity` â†’ logs
                  activity:
                    type: object
                    properties:
                      backend: { type: string, enum: [file, postgres] }
                      kindCounts:
                        type: object
                        additionalProperties: { type: integer }
                  doubts:
                    type: object
                    properties:
                      llmEnabled: { type: boolean }
                      streamAvailable:
                        type: boolean
                        description: Igual a llmEnabled â€” streaming em /api/aiox/doubts/chat/stream
  /api/aiox/doubts:
    get:
      summary: Capacidades do painel DĂşvidas & ajuda (UI)
      description: |
        Estado actual: notas em `sessionStorage` no browser vs. **LLM opcional** no servidor.
        `llmEnabled` Ă© `true` quando `MISSION_DOUBTS_LLM=1` e existe chave (`MISSION_LLM_API_KEY` recomendado, ou `OPENAI_API_KEY` legado) para API compatĂ­vel com `/v1/chat/completions`.
        `knowledgeBaseEnabled` reservado para indexaĂ§ĂŁo futura. Chaves sĂł no servidor (nunca no bundle Vite).
        `docsUrl` opcional via `MISSION_DOUBTS_HELP_URL`.
        `dataPolicyNotice` / `dataPolicyUrl`: aviso de privacidade (personalizĂˇvel com `MISSION_DOUBTS_DATA_NOTICE` / `MISSION_DOUBTS_DATA_POLICY_URL`).
        `rateLimitMax` + `rateLimitWindowMs`: limite partilhado entre `POST .../doubts/chat` e `.../chat/stream` (`DOUBTS_CHAT_RATE_MAX`, `DOUBTS_CHAT_WINDOW_MS`).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required:
                  - ok
                  - llmEnabled
                  - knowledgeBaseEnabled
                  - message
                  - streamAvailable
                  - dataPolicyNotice
                  - rateLimitMax
                  - rateLimitWindowMs
                properties:
                  ok: { type: boolean, example: true }
                  llmEnabled:
                    type: boolean
                    description: "true quando MISSION_DOUBTS_LLM=1 e chave configurada"
                  knowledgeBaseEnabled:
                    type: boolean
                    description: "IndexaĂ§ĂŁo docs/Notion para respostas (futuro; por defeito false)"
                  message: { type: string, description: Texto curto para a UI }
                  docsUrl:
                    type: string
                    nullable: true
                    description: URL opcional de ajuda (env MISSION_DOUBTS_HELP_URL)
                  streamAvailable:
                    type: boolean
                    description: "true quando o streaming (POST /api/aiox/doubts/chat/stream) estĂˇ disponĂ­vel â€” igual a llmEnabled"
                  dataPolicyNotice:
                    type: string
                    description: Aviso de privacidade para a UI (MISSION_DOUBTS_DATA_NOTICE ou texto por defeito)
                  dataPolicyUrl:
                    type: string
                    nullable: true
                    description: URL opcional para polĂ­tica completa (MISSION_DOUBTS_DATA_POLICY_URL)
                  rateLimitMax:
                    type: integer
                    description: MĂˇximo de POST chat+stream por IP por janela (DOUBTS_CHAT_RATE_MAX)
                  rateLimitWindowMs:
                    type: integer
                    description: DuraĂ§ĂŁo da janela em ms (DOUBTS_CHAT_WINDOW_MS, por defeito 60000)
  /api/aiox/doubts/chat:
    post:
      summary: Resposta do modelo (painel DĂşvidas) â€” opt-in
      description: |
        Requer `MISSION_DOUBTS_LLM=1` e chave (`MISSION_LLM_API_KEY` ou `OPENAI_API_KEY`). Usa `{MISSION_LLM_BASE_URL}/v1/chat/completions` (modelo `MISSION_LLM_MODEL`).
        Rate limit partilhado com `/chat/stream`: `DOUBTS_CHAT_RATE_MAX` pedidos por janela `DOUBTS_CHAT_WINDOW_MS` (por defeito 20 / 60s). Ăšltima mensagem em `messages` deve ser `role: user`.
        Pedidos registam mĂ©tricas em log (`doubtsLlm`, `msgCount`, `approxChars`) sem conteĂşdo das mensagens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  maxItems: 35
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string, maxLength: 8000 }
      responses:
        "200":
