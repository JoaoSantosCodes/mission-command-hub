openapi: 3.0.3
info:
  title: Architecture Agents Hub — API
  version: 1.0.0
  description: |
    Ponte HTTP ao aiox-core local: metadados de agentes (.md), versão CLI e feed de actividade (JSON no disco ou PostgreSQL com DATABASE_URL).

    **Rotas não definidas** sob `/api` devolvem `404` com JSON `{ ok: false, error }`. **Rate limit** (`429`) devolve JSON com `retryAfterSec` opcional.

    **UI — Canvas de tarefas (Kanban):** estado no cliente (`localStorage`); export/import JSON pode incluir `priority` e `blocked` por tarefa; sem sync entre dispositivos nem REST dedicado.
servers:
  - url: http://127.0.0.1:8787
    description: Desenvolvimento (PORT por defeito)
paths:
  /api/health:
    get:
      summary: Estado do serviço
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  service: { type: string, example: mission-agent-bridge }
  /api/aiox/metrics:
    get:
      summary: Métricas locais (CPU/memória) para a central de agentes (canvas)
      description: |
        Usado pelo escritório pixel art (rack de servidor). `disk_pct` e `temp_c` podem ser 0 quando não disponíveis.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_pct: { type: integer }
                  mem_pct: { type: integer }
                  disk_pct: { type: integer }
                  temp_c: { type: number }
                  uptime: { type: integer, description: segundos desde o arranque do processo Node }
  /api/aiox/weather:
    get:
      summary: Tempo (wttr.in) para o widget na central
      description: Localização por `WEATHER_LOCATION` (por defeito Lisbon,Portugal).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  temp_c: { oneOf: [{ type: string }, { type: number }] }
                  desc: { type: string }
                  code: { type: integer }
                  location: { type: string }
  /api/aiox/info:
    get:
      summary: Metadados aiox-core e contagem de agentes
      responses:
        "200":
          description: Informação agregada
          content:
            application/json:
              schema:
                type: object
                properties:
                  aioxRoot: { type: string }
                  aioxExists: { type: boolean }
                  agentsDir: { type: string }
                  version: { type: string, nullable: true }
                  versionError: { type: string, nullable: true }
                  agentCount: { type: integer }
                  agentsError: { type: string, nullable: true }
                  pathsMasked: { type: boolean, description: "Quando true, aioxRoot/agentsDir são truncados (MASK_PATHS_IN_UI)" }
                  aioxExecAvailable: { type: boolean, description: "Execução doctor/info disponível (env + segredo)" }
                  activityBackend:
                    type: string
                    enum: [file, postgres]
                    description: "Onde o feed de atividade está persistido (ficheiro JSON ou PostgreSQL)"
                  agentEditAllowed:
                    type: boolean
                    description: "false quando MISSION_AGENT_EDIT=0 — sem criar/editar/eliminar agentes (.md) via API"
  /api/aiox/overview:
    get:
      summary: Vista agregada (ponte + lista de agentes + feed + contagens)
      description: |
        Um único pedido em substituição de `GET /api/aiox/info` + `GET /api/aiox/agents` + `GET /api/aiox/activity` para o polling da UI.
        `activity.kindCounts` agrega entradas do feed por campo `kind` (ou `type` em entradas antigas).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  generatedAt: { type: string, format: date-time }
                  bridge:
                    description: Mesmo objecto que `/api/aiox/info`
                    type: object
                  agents:
                    type: array
                    items: { type: object }
                  agentsError: { type: string, nullable: true }
                  logs:
                    type: array
                    description: Mesmo formato que `/api/aiox/activity` → logs
                  activity:
                    type: object
                    properties:
                      backend: { type: string, enum: [file, postgres] }
                      kindCounts:
                        type: object
                        additionalProperties: { type: integer }
                  doubts:
                    type: object
                    properties:
                      llmEnabled: { type: boolean }
  /api/aiox/doubts:
    get:
      summary: Capacidades do painel Dúvidas & ajuda (UI)
      description: |
        Estado actual: notas em `sessionStorage` no browser vs. **LLM opcional** no servidor.
        `llmEnabled` é `true` quando `MISSION_DOUBTS_LLM=1` e existe chave OpenAI-compatible (`OPENAI_API_KEY` ou `MISSION_LLM_API_KEY`).
        `knowledgeBaseEnabled` reservado para indexação futura. Chaves só no servidor (nunca no bundle Vite).
        `docsUrl` opcional via `MISSION_DOUBTS_HELP_URL`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, llmEnabled, knowledgeBaseEnabled, message]
                properties:
                  ok: { type: boolean, example: true }
                  llmEnabled:
                    type: boolean
                    description: "true quando MISSION_DOUBTS_LLM=1 e chave configurada"
                  knowledgeBaseEnabled:
                    type: boolean
                    description: "Indexação docs/Notion para respostas (futuro; por defeito false)"
                  message: { type: string, description: Texto curto para a UI }
                  docsUrl:
                    type: string
                    nullable: true
                    description: URL opcional de ajuda (env MISSION_DOUBTS_HELP_URL)
  /api/aiox/doubts/chat:
    post:
      summary: Resposta do modelo (painel Dúvidas) — opt-in
      description: |
        Requer `MISSION_DOUBTS_LLM=1` e chave OpenAI-compatible. Usa endpoint `/v1/chat/completions` (modelo `MISSION_LLM_MODEL`, por defeito gpt-4o-mini).
        Rate limit: `DOUBTS_CHAT_RATE_MAX` por IP por minuto (por defeito 20). Última mensagem em `messages` deve ser `role: user`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  maxItems: 35
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string, maxLength: 8000 }
      responses:
        "200":
          description: Resposta de texto do modelo
          content:
            application/json:
              schema:
                type: object
                required: [ok, reply]
                properties:
                  ok: { type: boolean, example: true }
                  reply: { type: string }
        "400":
          description: Payload inválido
        "429":
          description: Rate limit
        "502":
          description: Erro do fornecedor do modelo
        "503":
          description: LLM desactivado (sem env)
  /api/aiox/agents:
    get:
      summary: Lista de agentes (.md)
      responses:
        "200":
          description: Lista obtida
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        file: { type: string }
                        title: { type: string }
        "500":
          description: Pasta de agentes inacessível
    post:
      summary: Criar novo ficheiro de agente (.md)
      description: |
        Cria `.aiox-core/development/agents/{id}.md` sob o aiox-core (pastas criadas se necessário).
        Requer que a raiz do aiox-core exista. Corpo JSON com `id` obrigatório; `content` opcional (senão modelo mínimo).
        Desactivar com `MISSION_AGENT_EDIT=0`. Rate limit partilhado com PUT/DELETE de agentes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Identificador seguro (letras, números, . _ - ; máx. 128 chars após o primeiro)
                content:
                  type: string
                  description: Markdown completo opcional; se omitido ou vazio, servidor usa modelo mínimo
      responses:
        "201":
          description: Ficheiro criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  id: { type: string }
                  bytes: { type: integer }
        "400":
          description: id inválido
        "403":
          description: Criação desactivada (MISSION_AGENT_EDIT=0)
        "409":
          description: Já existe agente com o mesmo id
        "413":
          description: Conteúdo demasiado grande
        "429":
          description: Rate limit
        "503":
          description: aiox-core não encontrado (AIOX_CORE_PATH)
  /api/aiox/agents/{id}:
    get:
      summary: Conteúdo Markdown de um agente (id sem .md)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Corpo do ficheiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  file: { type: string }
                  title: { type: string }
                  content: { type: string }
                  revision:
                    type: string
                    description: "mtime:size — enviar no PUT (If-Match ou body.revision) para detectar alterações externas"
        "400":
          description: id inválido
        "404":
          description: Agente não encontrado
        "413":
          description: Ficheiro demasiado grande (>512 KiB)
    put:
      summary: Gravar definição Markdown do agente (skill/persona no YAML do ficheiro)
      description: |
        Escreve o ficheiro `.md` em `.aiox-core/development/agents/{id}.md`.
        Desactivar com `MISSION_AGENT_EDIT=0`.
        Se enviares `If-Match` ou `revision` no corpo com o valor de `GET` (campo `revision`), o servidor devolve **409** se o ficheiro mudou no disco entretanto.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: If-Match
          in: header
          required: false
          schema: { type: string }
          description: Valor igual a `revision` do GET (opcional mas recomendado)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Texto completo UTF-8 (máx. 512 KiB)
                revision:
                  type: string
                  description: Alternativa ao cabeçalho If-Match
      responses:
        "200":
          description: Gravado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  id: { type: string }
                  bytes: { type: integer }
        "400":
          description: id inválido ou body inválido
        "403":
          description: Edição desactivada (MISSION_AGENT_EDIT=0)
        "404":
          description: Agente não encontrado
        "409":
          description: Conflito — `revision` desactualizada (ficheiro alterado fora da UI)
        "413":
          description: Conteúdo demasiado grande
        "429":
          description: Rate limit (PUT agente)
    delete:
      summary: Eliminar ficheiro do agente
      description: Remove o `.md` do disco. Desactivar com `MISSION_AGENT_EDIT=0`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  id: { type: string }
        "400":
          description: id inválido
        "403":
          description: Eliminação desactivada (MISSION_AGENT_EDIT=0)
        "404":
          description: Agente não encontrado
        "429":
          description: Rate limit
  /api/aiox/activity:
    get:
      summary: Feed de atividade (JSON no servidor ou PostgreSQL; ver activityBackend em /api/aiox/info)
      responses:
        "200":
          description: Lista de entradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
  /api/aiox/exec:
    post:
      summary: Executa aiox doctor ou aiox info (opt-in; confirmação obrigatória)
      description: |
        Requer ENABLE_AIOX_CLI_EXEC e AIOX_EXEC_SECRET (≥8 caracteres) no servidor.
        Corpo JSON com subcomando permitido e o mesmo segredo em `confirm`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subcommand, confirm]
              properties:
                subcommand:
                  type: string
                  enum: [doctor, info]
                confirm:
                  type: string
                  description: Deve coincidir com AIOX_EXEC_SECRET
      responses:
        "200":
          description: Processo terminado (ok reflecte exit code 0)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  subcommand: { type: string }
                  exitCode: { type: integer, nullable: true }
                  timedOut: { type: boolean }
                  stdout: { type: string }
                  stderr: { type: string }
                  activityLogged:
                    type: boolean
                    description: "false se o feed de atividade falhou após o CLI (resultado do exec mantém-se)"
        "400":
          description: Subcomando inválido
        "403":
          description: Segredo incorrecto
        "429":
          description: Rate limit (exec)
        "503":
          description: Funcionalidade desactivada ou segredo não configurado
  /api/aiox/command:
    post:
      summary: Regista comando (não executa shell)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  description: Texto do comando (máx. 4000 caracteres após trim)
      responses:
        "200":
          description: Registado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  message: { type: string }
                  agentsAvailable: { type: integer }
        "400":
          description: Comando vazio ou demasiado longo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
        "429":
          description: Limite de pedidos por IP (rate limit no POST /command)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitedError"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok: { type: boolean, example: false }
        error: { type: string }
    RateLimitedError:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            retryAfterSec:
              type: integer
              description: Segundos até à janela do rate limit resetar (quando disponível)
    NotFoundApi:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
      example:
        ok: false
        error: recurso API não encontrado
