openapi: 3.0.3
info:
  title: Architecture Agents Hub — API
  version: 1.0.0
  description: |
    Ponte HTTP ao aiox-core local: metadados de agentes (.md), versão CLI e feed de actividade (JSON no disco ou PostgreSQL com DATABASE_URL).

    **Rotas não definidas** sob `/api` devolvem `404` com JSON `{ ok: false, error }`. **Rate limit** (`429`) devolve JSON com `retryAfterSec` opcional.

    **UI — Canvas de tarefas (Kanban):** por defeito `localStorage`; export/import JSON pode incluir `priority` e `blocked`. Opcional: **`GET`/`PUT /api/aiox/task-board`** persistem o quadro em JSON no servidor (`MISSION_TASK_BOARD_PATH`; por defeito `.mission-agent/task-board.json`) quando a UI define **`VITE_TASK_BOARD_SYNC`**. `PUT` aceita cabeçalho **`If-Match`** com `revision` (mtime:size) — conflito **409**.
servers:
  - url: http://127.0.0.1:8787
    description: Desenvolvimento (PORT por defeito)
paths:
  /api/health:
    get:
      summary: Estado do serviço
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  service: { type: string, example: mission-agent-bridge }
  /api/aiox/metrics:
    get:
      summary: Métricas locais (CPU/memória) para a central de agentes (canvas)
      description: |
        Usado pelo escritório pixel art (rack de servidor). `disk_pct` e `temp_c` podem ser 0 quando não disponíveis.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  cpu_pct: { type: integer }
                  mem_pct: { type: integer }
                  disk_pct: { type: integer }
                  temp_c: { type: number }
                  uptime: { type: integer, description: segundos desde o arranque do processo Node }
  /api/aiox/weather:
    get:
      summary: Tempo (wttr.in) para o widget na central
      description: Localização por `WEATHER_LOCATION` (por defeito Lisbon,Portugal).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  temp_c: { oneOf: [{ type: string }, { type: number }] }
                  desc: { type: string }
                  code: { type: integer }
                  location: { type: string }
  /api/aiox/info:
    get:
      summary: Metadados aiox-core e contagem de agentes
      responses:
        "200":
          description: Informação agregada
          content:
            application/json:
              schema:
                type: object
                properties:
                  aioxRoot:
                    type: string
                    description: Raiz do projeto AIOX (pasta com .aiox-core); não é só o nome do repositório git
                  aioxExists: { type: boolean }
                  agentsDir:
                    type: string
                    description: Pasta dos *.md resolvida via resource_locations.agents_dir (L1→L2→L4) ou AIOX_AGENTS_DIR
                  version: { type: string, nullable: true }
                  versionError: { type: string, nullable: true }
                  agentCount: { type: integer }
                  agentsError: { type: string, nullable: true }
                  pathsMasked: { type: boolean, description: "Quando true, aioxRoot/agentsDir são truncados (MASK_PATHS_IN_UI)" }
                  aioxExecAvailable: { type: boolean, description: "Execução doctor/info disponível (env + segredo)" }
                  activityBackend:
                    type: string
                    enum: [file, postgres]
                    description: "Onde o feed de atividade está persistido (ficheiro JSON ou PostgreSQL)"
                  agentEditAllowed:
                    type: boolean
                    description: "false quando MISSION_AGENT_EDIT=0 — sem criar/editar/eliminar agentes (.md) via API"
                  taskBoard:
                    type: object
                    description: "Quadro Kanban persistido em ficheiro (mesmo caminho que GET task-board)"
                    properties:
                      revision:
                        type: string
                        description: "mtime:size do ficheiro (vazio = 0:0)"
                      taskCount: { type: integer }
  /api/aiox/task-board:
    get:
      summary: Quadro Kanban (Canvas) persistido no servidor
      description: |
        Ficheiro JSON por defeito em `MissionAgent/.mission-agent/task-board.json` (ou `MISSION_TASK_BOARD_PATH`).
        A UI sincroniza só com `VITE_TASK_BOARD_SYNC=1` no build Vite.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, tasks, revision]
                properties:
                  ok: { type: boolean, example: true }
                  tasks:
                    type: array
                    description: Tarefas validadas (colunas todo|doing|review|done)
                    items: { type: object }
                  revision:
                    type: string
                    description: "Usar em If-Match no PUT"
    put:
      summary: Gravar quadro Kanban no servidor
      description: |
        Corpo `{ "tasks": [ ... ] }` (ou array no topo). Máximo 2000 tarefas. Rate limit `TASK_BOARD_PUT_RATE_MAX` por IP/min (por defeito 45).
        Com cabeçalho `If-Match` diferente da revisão actual do ficheiro → **409** `conflict`.
      parameters:
        - name: If-Match
          in: header
          required: false
          schema: { type: string }
          description: Revisão devolvida por GET (ou `0:0` se o ficheiro não existir)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - type: object
                  required: [tasks]
                  properties:
                    tasks: { type: array, items: { type: object } }
                - type: array
                  description: Alternativa aceite — lista de tarefas
                  items: { type: object }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, revision]
                properties:
                  ok: { type: boolean, example: true }
                  revision: { type: string }
        "400":
          description: Payload inválido
        "409":
          description: Conflito (If-Match)
        "429":
          description: Rate limit
  /api/aiox/customization:
    get:
      summary: Personalização do hub (agentes + escritório)
      description: |
        Contrato base para modo híbrido (local agora, sync servidor opcional).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  data:
                    type: object
                    properties:
                      agents:
                        type: object
                        additionalProperties: { type: object }
                      office:
                        type: object
                  revision: { type: string, description: "Usar no If-Match do PUT" }
    put:
      summary: Gravar personalização do hub
      parameters:
        - name: If-Match
          in: header
          required: false
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agents:
                  type: object
                  additionalProperties: { type: object }
                office:
                  type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  revision: { type: string }
        "409":
          description: Conflito (If-Match)
        "429":
          description: Rate limit
  /api/aiox/fish:
    get:
      summary: Estado do aquário (ração do peixe)
      description: |
        Persiste `food`/`maxFood` num ficheiro local (`MISSION_FISH_PATH` ou por defeito `.mission-agent/fish-state.json`) e devolve um `mood` derivado.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  food: { type: integer }
                  maxFood: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  mood:
                    type: string
                    enum: [feliz, normal, fome, critico]
  /api/aiox/fish/consume:
    post:
      summary: Consome ração do aquário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, description: 'Quantidade a consumir (0-50)' }
                source: { type: string, description: 'Origem do consumo (ex: command; task:doing)' }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  food: { type: integer }
                  maxFood: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  mood:
                    type: string
                    enum: [feliz, normal, fome, critico]
  /api/aiox/fish/feed:
    post:
      summary: Alimenta o peixe (recupera ração)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount: { type: integer, description: Quantidade a adicionar (1-50) }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  food: { type: integer }
                  maxFood: { type: integer }
                  updatedAt: { type: string, format: date-time }
                  mood:
                    type: string
                    enum: [feliz, normal, fome, critico]
  /api/aiox/integrations-status:
    get:
      summary: Status de integrações (API / DB / LLM / tokens)
      parameters:
        - name: validate
          in: query
          required: false
          schema:
            type: string
            enum: ["1"]
      description: |
        Painel para a UI verificar o que o servidor consegue detetar (env/configs e capacidades).
        Quando `validate=1`, o servidor faz chamadas HTTP leves para validar chaves/tokens:
        OpenAI `/v1/models`, Notion `/v1/users/me`, Figma `/v1/me`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, generatedAt, database, exec, doubts, notion, figma, fish, slack]
                properties:
                  ok: { type: boolean, example: true }
                  generatedAt: { type: string, format: date-time }
                  summary:
                    type: object
                    properties:
                      okCount: { type: integer }
                      total: { type: integer }
                      healthScore: { type: integer, minimum: 0, maximum: 100 }
                  alerts:
                    type: array
                    description: Alertas operacionais derivados do estado atual.
                    items: { type: string }
                  history:
                    type: array
                    description: Últimos snapshots de saúde (persistidos no servidor quando validate=1).
                    items:
                      type: object
                      properties:
                        generatedAt: { type: string, format: date-time }
                        healthScore: { type: integer, minimum: 0, maximum: 100 }
                        okCount: { type: integer }
                        total: { type: integer }
                        alerts:
                          type: array
                          items: { type: string }
                  database:
                    type: object
                    properties:
                      configured: { type: boolean }
                      activityBackend: { type: string, enum: [file, postgres] }
                  exec:
                    type: object
                    properties:
                      configured: { type: boolean }
                  doubts:
                    type: object
                    properties:
                      openaiKeyConfigured: { type: boolean }
                      doubtsOptIn: { type: boolean }
                      llmEnabled: { type: boolean }
                      streamAvailable: { type: boolean }
                      openaiValidated:
                        type: boolean
                        description: "Só existe quando validate=1."
                      openaiError:
                        type: string
                        nullable: true
                  notion:
                    type: object
                    properties:
                      tokenConfigured: { type: boolean }
                      tokenValidated:
                        type: boolean
                        description: "Só existe quando validate=1."
                      tokenError:
                        type: string
                        nullable: true
                  figma:
                    type: object
                    properties:
                      tokenConfigured: { type: boolean }
                      tokenValidated:
                        type: boolean
                        description: "Só existe quando validate=1."
                      tokenError:
                        type: string
                        nullable: true
                  fish:
                    type: object
                    properties:
                      persistence: { type: string, example: file }
                      enabled: { type: boolean }
                  slack:
                    type: object
                    description: Espelho opcional do feed para Slack (Incoming Webhook).
                    properties:
                      persistence: { type: string, example: webhook }
                      enabled: { type: boolean }
                      webhookConfigured: { type: boolean }
                      webhookFormatOk: { type: boolean }
                      mirrorReady: { type: boolean }
  /api/aiox/overview:
    get:
      summary: Vista agregada (ponte + lista de agentes + feed + contagens)
      description: |
        Um único pedido em substituição de `GET /api/aiox/info` + `GET /api/aiox/agents` + `GET /api/aiox/activity` para o polling da UI.
        `activity.kindCounts` agrega entradas do feed por campo `kind` (ou `type` em entradas antigas).
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  generatedAt: { type: string, format: date-time }
                  bridge:
                    description: Mesmo objecto que `/api/aiox/info`
                    type: object
                  agents:
                    type: array
                    items: { type: object }
                  agentsError: { type: string, nullable: true }
                  logs:
                    type: array
                    description: Mesmo formato que `/api/aiox/activity` → logs
                  activity:
                    type: object
                    properties:
                      backend: { type: string, enum: [file, postgres] }
                      kindCounts:
                        type: object
                        additionalProperties: { type: integer }
                  doubts:
                    type: object
                    properties:
                      llmEnabled: { type: boolean }
                      streamAvailable:
                        type: boolean
                        description: Igual a llmEnabled — streaming em /api/aiox/doubts/chat/stream
  /api/aiox/doubts:
    get:
      summary: Capacidades do painel Dúvidas & ajuda (UI)
      description: |
        Estado actual: notas em `sessionStorage` no browser vs. **LLM opcional** no servidor.
        `llmEnabled` é `true` quando `MISSION_DOUBTS_LLM=1` e existe chave OpenAI-compatible (`OPENAI_API_KEY` ou `MISSION_LLM_API_KEY`).
        `knowledgeBaseEnabled` reservado para indexação futura. Chaves só no servidor (nunca no bundle Vite).
        `docsUrl` opcional via `MISSION_DOUBTS_HELP_URL`.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                required: [ok, llmEnabled, knowledgeBaseEnabled, message]
                properties:
                  ok: { type: boolean, example: true }
                  llmEnabled:
                    type: boolean
                    description: "true quando MISSION_DOUBTS_LLM=1 e chave configurada"
                  knowledgeBaseEnabled:
                    type: boolean
                    description: "Indexação docs/Notion para respostas (futuro; por defeito false)"
                  message: { type: string, description: Texto curto para a UI }
                  docsUrl:
                    type: string
                    nullable: true
                    description: URL opcional de ajuda (env MISSION_DOUBTS_HELP_URL)
                  streamAvailable:
                    type: boolean
                    description: "true quando o streaming (POST /api/aiox/doubts/chat/stream) está disponível — igual a llmEnabled"
  /api/aiox/doubts/chat:
    post:
      summary: Resposta do modelo (painel Dúvidas) — opt-in
      description: |
        Requer `MISSION_DOUBTS_LLM=1` e chave OpenAI-compatible. Usa endpoint `/v1/chat/completions` (modelo `MISSION_LLM_MODEL`, por defeito gpt-4o-mini).
        Rate limit: `DOUBTS_CHAT_RATE_MAX` por IP por minuto (por defeito 20). Última mensagem em `messages` deve ser `role: user`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  maxItems: 35
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string, maxLength: 8000 }
      responses:
        "200":
          description: Resposta de texto do modelo
          content:
            application/json:
              schema:
                type: object
                required: [ok, reply]
                properties:
                  ok: { type: boolean, example: true }
                  reply: { type: string }
        "400":
          description: Payload inválido
        "429":
          description: Rate limit
        "502":
          description: Erro do fornecedor do modelo
        "503":
          description: LLM desactivado (sem env)
  /api/aiox/doubts/chat/stream:
    post:
      summary: Resposta do modelo em streaming (SSE) — painel Dúvidas
      description: |
        Mesmo corpo e validação que `POST /api/aiox/doubts/chat`. Resposta `text/event-stream`: linhas `data: {"delta":"..."}` (troços de texto) e final `data: [DONE]`.
        Erro: linha `data: {"error":"..."}`. Rate limit partilhado (`DOUBTS_CHAT_RATE_MAX`). Timeout longo: `MISSION_LLM_STREAM_TIMEOUT_MS` ou `MISSION_LLM_TIMEOUT_MS`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messages]
              properties:
                messages:
                  type: array
                  minItems: 1
                  maxItems: 35
                  items:
                    type: object
                    required: [role, content]
                    properties:
                      role: { type: string, enum: [user, assistant] }
                      content: { type: string, maxLength: 8000 }
      responses:
        "200":
          description: Stream SSE (text/event-stream)
          content:
            text/event-stream:
              schema:
                type: string
                description: Linhas SSE; tokens em JSON `delta`; fim `[DONE]`
        "400":
          description: Payload inválido (JSON)
        "429":
          description: Rate limit
        "503":
          description: LLM desactivado (JSON)
  /api/aiox/agents:
    get:
      summary: Lista de agentes (.md)
      responses:
        "200":
          description: Lista obtida
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        file: { type: string }
                        title: { type: string }
        "500":
          description: Pasta de agentes inacessível
    post:
      summary: Criar novo ficheiro de agente (.md)
      description: |
        Cria `.aiox-core/development/agents/{id}.md` sob o aiox-core (pastas criadas se necessário).
        Requer que a raiz do aiox-core exista. Corpo JSON com `id` obrigatório; `content` opcional (senão modelo mínimo).
        Desactivar com `MISSION_AGENT_EDIT=0`. Rate limit partilhado com PUT/DELETE de agentes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id]
              properties:
                id:
                  type: string
                  description: Identificador seguro (letras, números, . _ - ; máx. 128 chars após o primeiro)
                content:
                  type: string
                  description: Markdown completo opcional; se omitido ou vazio, servidor usa modelo mínimo
      responses:
        "201":
          description: Ficheiro criado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  id: { type: string }
                  bytes: { type: integer }
        "400":
          description: id inválido
        "403":
          description: Criação desactivada (MISSION_AGENT_EDIT=0)
        "409":
          description: Já existe agente com o mesmo id
        "413":
          description: Conteúdo demasiado grande
        "429":
          description: Rate limit
        "503":
          description: aiox-core não encontrado (AIOX_CORE_PATH)
  /api/aiox/agents/{id}:
    get:
      summary: Conteúdo Markdown de um agente (id sem .md)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Corpo do ficheiro
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  file: { type: string }
                  title: { type: string }
                  content: { type: string }
                  revision:
                    type: string
                    description: "mtime:size — enviar no PUT (If-Match ou body.revision) para detectar alterações externas"
        "400":
          description: id inválido
        "404":
          description: Agente não encontrado
        "413":
          description: Ficheiro demasiado grande (>512 KiB)
    put:
      summary: Gravar definição Markdown do agente (skill/persona no YAML do ficheiro)
      description: |
        Escreve o ficheiro `.md` em `.aiox-core/development/agents/{id}.md`.
        Desactivar com `MISSION_AGENT_EDIT=0`.
        Se enviares `If-Match` ou `revision` no corpo com o valor de `GET` (campo `revision`), o servidor devolve **409** se o ficheiro mudou no disco entretanto.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: If-Match
          in: header
          required: false
          schema: { type: string }
          description: Valor igual a `revision` do GET (opcional mas recomendado)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  description: Texto completo UTF-8 (máx. 512 KiB)
                revision:
                  type: string
                  description: Alternativa ao cabeçalho If-Match
      responses:
        "200":
          description: Gravado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  id: { type: string }
                  bytes: { type: integer }
        "400":
          description: id inválido ou body inválido
        "403":
          description: Edição desactivada (MISSION_AGENT_EDIT=0)
        "404":
          description: Agente não encontrado
        "409":
          description: Conflito — `revision` desactualizada (ficheiro alterado fora da UI)
        "413":
          description: Conteúdo demasiado grande
        "429":
          description: Rate limit (PUT agente)
    delete:
      summary: Eliminar ficheiro do agente
      description: Remove o `.md` do disco. Desactivar com `MISSION_AGENT_EDIT=0`.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Eliminado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  id: { type: string }
        "400":
          description: id inválido
        "403":
          description: Eliminação desactivada (MISSION_AGENT_EDIT=0)
        "404":
          description: Agente não encontrado
        "429":
          description: Rate limit
  /api/aiox/activity:
    get:
      summary: Feed de atividade (JSON no servidor ou PostgreSQL; ver activityBackend em /api/aiox/info)
      responses:
        "200":
          description: Lista de entradas
          content:
            application/json:
              schema:
                type: object
                properties:
                  logs:
                    type: array
                    items:
                      type: object
  /api/aiox/activity/event:
    post:
      summary: "Regista evento de atividade (ex.: Task Canvas) no feed"
      description: |
        Permite que módulos da UI publiquem eventos de equipa no feed central.
        Usado para refletir ações entre abas sem esperar só pelo polling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                agent:
                  type: string
                  description: "Identificador do emissor (ex.: @task-canvas)"
                action:
                  type: string
                  description: "Texto curto do evento"
                type:
                  type: string
                  description: "Tipo visual da entrada (default output)"
                kind:
                  type: string
                  description: "Kind semântico (default bridge)"
      responses:
        "200":
          description: Evento registado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
        "400":
          description: action vazio
        "429":
          description: Rate limit
        "500":
          description: Falha ao gravar no feed
  /api/aiox/exec:
    post:
      summary: Executa aiox doctor ou aiox info (opt-in; confirmação obrigatória)
      description: |
        Requer ENABLE_AIOX_CLI_EXEC e AIOX_EXEC_SECRET (≥8 caracteres) no servidor.
        Corpo JSON com subcomando permitido e o mesmo segredo em `confirm`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subcommand, confirm]
              properties:
                subcommand:
                  type: string
                  enum: [doctor, info]
                confirm:
                  type: string
                  description: Deve coincidir com AIOX_EXEC_SECRET
      responses:
        "200":
          description: Processo terminado (ok reflecte exit code 0)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean }
                  subcommand: { type: string }
                  exitCode: { type: integer, nullable: true }
                  timedOut: { type: boolean }
                  stdout: { type: string }
                  stderr: { type: string }
                  activityLogged:
                    type: boolean
                    description: "false se o feed de atividade falhou após o CLI (resultado do exec mantém-se)"
        "400":
          description: Subcomando inválido
        "403":
          description: Segredo incorrecto
        "429":
          description: Rate limit (exec)
        "503":
          description: Funcionalidade desactivada ou segredo não configurado
  /api/aiox/command:
    post:
      summary: Regista comando (não executa shell)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [command]
              properties:
                command:
                  type: string
                  description: Texto do comando (máx. 4000 caracteres após trim)
      responses:
        "200":
          description: Registado
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: true }
                  message: { type: string }
                  agentsAvailable: { type: integer }
        "400":
          description: Comando vazio ou demasiado longo
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok: { type: boolean, example: false }
                  error: { type: string }
        "429":
          description: Limite de pedidos por IP (rate limit no POST /command)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RateLimitedError"

components:
  schemas:
    ErrorResponse:
      type: object
      required: [ok, error]
      properties:
        ok: { type: boolean, example: false }
        error: { type: string }
    RateLimitedError:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            retryAfterSec:
              type: integer
              description: Segundos até à janela do rate limit resetar (quando disponível)
    NotFoundApi:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
      example:
        ok: false
        error: recurso API não encontrado
